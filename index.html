<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Rock B2B Dashboard</title>
    
    <!-- Fonts & Icons from Stitch HTML -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2c84a",
                        "primary-dim": "#b39020",
                        "background-dark": "#111113",
                        "surface": "#1E1E21",
                        "surface-highlight": "#2a2a2d",
                        "text-main": "#EAEAEA",
                        "text-muted": "#888888",
                        "border-subtle": "#333336",
                        "accent-red": "#EB5757",
                        "accent-green": "#27AE60",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans JP", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    backgroundImage: {
                        "grid-pattern": "linear-gradient(to right, #333336 1px, transparent 1px), linear-gradient(to bottom, #333336 1px, transparent 1px)",
                    }
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar for industrial feel */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111113; }
        ::-webkit-scrollbar-thumb { background: #333336; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .technical-grid {
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, 10%, black, 90%, transparent);
            opacity: 0.1;
            pointer-events: none;
        }
        /* Circular progress animation */
        circle {
            transition: stroke-dashoffset 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
  </head>
  <body class="bg-background-dark text-text-main font-display antialiased overflow-hidden h-screen flex">
    <div id="root" class="w-full h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
